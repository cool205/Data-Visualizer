services:
  - type: web
    name: dataviz
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --preload
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MPLCONFIGDIR
        value: /tmp
